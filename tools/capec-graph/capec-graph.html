  #legend { padding: 10px 16px; border-bottom: 1px solid #333; display: flex; flex-wrap: wrap; gap: 8px; }

  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  #filter-bar { padding: 8px 16px; border-bottom: 1px solid #333; display: flex; gap: 4px; flex-wrap: wrap; }

  #view-selector { padding: 8px 16px; border-bottom: 1px solid #333; }

    width: 100%; padding: 5px 8px; background: #2a2a2a; border: 1px solid #444;
    border-radius: 6px; color: #e2e8f0; font-size: 11px; outline: none;

  #mode-toggle { padding: 8px 16px; border-bottom: 1px solid #333; display: flex; gap: 4px; }
  .mode-btn { flex: 1; text-align: center; padding: 5px 0; font-size: 11px; }

  .node-item .id-label { font-size: 9px; color: #888; }

  #graph-container { position: absolute; inset: 0; }
  canvas { display: block; }

  #tree-container {
    position: absolute; inset: 0; overflow-y: auto; display: none;
    background: #1a1a1a; padding: 16px 24px;
  }

  .tree-toggle.leaf { visibility: hidden; }

  .tree-label { font-size: 12px; color: #e2e8f0; }
  .tree-id { font-size: 9px; color: #888; margin-left: 4px; }

    display: flex; align-items: center; justify-content: center;

  }

</style>

const REL_MAP = {H:'HasMember',C:'ChildOf',P:'CanPrecede',E:'PeerOf'};

const nodes = _N.map(a => ({
  id: a[0], name: a[1], type: TYPE_MAP[a[2]],
  x: 0, y: 0, vx: 0, vy: 0
}));
const edges = _E.map(a => ({ s: a[0], t: a[1], r: REL_MAP[a[2]] }));

const nodeMap = new Map();
nodes.forEach(n => nodeMap.set(n.id, n));

const adjOut = new Map();
const adjIn = new Map();
nodes.forEach(n => { adjOut.set(n.id, []); adjIn.set(n.id, []); });
edges.forEach(e => {
  if (adjOut.has(e.s)) adjOut.get(e.s).push({ id: e.t, r: e.r });
  if (adjIn.has(e.t)) adjIn.get(e.t).push({ id: e.s, r: e.r });
});

// ── Colors ──
const COLORS = {
  view:     { fill: '#f59e0b', glow: '#fbbf2480' },
  category: { fill: '#6366f1', glow: '#818cf880' },
  meta:     { fill: '#10b981', glow: '#34d39980' },
  standard: { fill: '#3b82f6', glow: '#60a5fa80' },
  detailed: { fill: '#8b5cf6', glow: '#a78bfa80' },
};
const SIZES = { view: 24, category: 18, meta: 12, standard: 8, detailed: 5 };
const EDGE_COLORS = { HasMember: '#2a2a2a', ChildOf: '#2a2a2a', CanPrecede: '#f59e0b', PeerOf: '#444' };

// ── Canvas ──
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
let W, H, dpr;
let camera = { x: 0, y: 0, zoom: 0.6 };
let selectedNode = null, hoveredNode = null, dragNode = null;
let isPanning = false, panStart = { x: 0, y: 0 };
let activeFilter = 'all';
let hiddenTypes = new Set();
let activeView = 'all';
let viewMode = 'graph';

function resize() {
  const cont = document.getElementById('graph-container');
  dpr = window.devicePixelRatio || 1;
  W = cont.clientWidth; H = cont.clientHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ── Initial layout ──
function initPositions() {
  const views = nodes.filter(n => n.type === 'view');
  views.forEach((v, vi) => {
    const angle0 = (2 * Math.PI * vi / views.length);
    v.x = Math.cos(angle0) * 800 * (views.length > 1 ? 1 : 0);
    v.y = Math.sin(angle0) * 800 * (views.length > 1 ? 1 : 0);

    const cats = adjOut.get(v.id).filter(e => e.r === 'HasMember').map(e => e.id);
    cats.forEach((cid, ci) => {
      const cat = nodeMap.get(cid); if (!cat) return;
      const ca = (2 * Math.PI * ci / cats.length) + angle0;
      cat.x = v.x + Math.cos(ca) * 400;
      cat.y = v.y + Math.sin(ca) * 400;

      const metas = adjOut.get(cid).filter(e => e.r === 'HasMember').map(e => e.id);
      metas.forEach((mid, mi) => {
        const meta = nodeMap.get(mid); if (!meta) return;
        const ma = ca + (mi - metas.length/2) * (0.6 / Math.max(metas.length, 1));
        meta.x = cat.x + Math.cos(ma) * 250;
        meta.y = cat.y + Math.sin(ma) * 250;

        const stds = adjOut.get(mid).filter(e => e.r === 'ChildOf').map(e => e.id);
        stds.forEach((sid, si) => {
          const std = nodeMap.get(sid); if (!std) return;
          const sa = ma + (si - stds.length/2) * (0.4 / Math.max(stds.length, 1));
          std.x = meta.x + Math.cos(sa) * 150;
          std.y = meta.y + Math.sin(sa) * 150;

          const details = adjOut.get(sid).filter(e => e.r === 'ChildOf').map(e => e.id);
          details.forEach((did, di) => {
            const det = nodeMap.get(did); if (!det) return;
            const da = sa + (di - details.length/2) * (0.35 / Math.max(details.length, 1));
            det.x = std.x + Math.cos(da) * 90;
            det.y = std.y + Math.sin(da) * 90;
          });
        });
      });
    });
  });
  nodes.forEach(n => {
    if (n.x === 0 && n.y === 0 && n.type !== 'view') {
      n.x = (Math.random() - 0.5) * 1500;
      n.y = (Math.random() - 0.5) * 1500;
    }
  });
}

// ── Force simulation (Barnes-Hut) ──
let alpha = 1;

class QuadTree {
  constructor(x, y, w, h) { this.x=x;this.y=y;this.w=w;this.h=h;this.body=null;this.mass=0;this.cx=0;this.cy=0;this.children=null; }
  insert(n) {
    if (!this.mass && !this.body) { this.body=n;this.mass=1;this.cx=n.x;this.cy=n.y; return; }
    if (!this.children) { this.subdivide(); if (this.body) { this._ic(this.body); this.body=null; } }
    this._ic(n);
    this.cx=(this.cx*this.mass+n.x)/(this.mass+1);
    this.cy=(this.cy*this.mass+n.y)/(this.mass+1);
    this.mass++;
  }
  subdivide() {
    const hw=this.w/2,hh=this.h/2;
    this.children=[new QuadTree(this.x,this.y,hw,hh),new QuadTree(this.x+hw,this.y,hw,hh),new QuadTree(this.x,this.y+hh,hw,hh),new QuadTree(this.x+hw,this.y+hh,hw,hh)];
  }
  _ic(n) { const ix=n.x<this.x+this.w/2?0:1,iy=n.y<this.y+this.h/2?0:2; this.children[ix+iy].insert(n); }
  calcForce(n,theta,fx) {
    if (!this.mass) return; if (this.body===n) return;
    const dx=this.cx-n.x,dy=this.cy-n.y,d2=dx*dx+dy*dy+1,d=Math.sqrt(d2);
    if (!this.children||(this.w/d<theta)) { const f=-this.mass*1200/d2*alpha; fx[0]+=dx/d*f; fx[1]+=dy/d*f; return; }
    for (const c of this.children) c.calcForce(n,theta,fx);
  }
}

function simulate() {
  if (alpha < 0.001) return false;
  alpha *= 0.992;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  nodes.forEach(n=>{if(n.x<minX)minX=n.x;if(n.y<minY)minY=n.y;if(n.x>maxX)maxX=n.x;if(n.y>maxY)maxY=n.y;});
  const pad=100,sz=Math.max(maxX-minX,maxY-minY)+pad*2;
  const qt=new QuadTree(minX-pad,minY-pad,sz,sz);
  nodes.forEach(n=>qt.insert(n));
  const fx=[0,0];
  nodes.forEach(n=>{fx[0]=0;fx[1]=0;qt.calcForce(n,0.7,fx);n.vx+=fx[0];n.vy+=fx[1];});
  const td={HasMember:180,ChildOf:140,CanPrecede:300,PeerOf:200};
  edges.forEach(e=>{
    const a=nodeMap.get(e.s),b=nodeMap.get(e.t); if(!a||!b) return;
    const dx=b.x-a.x,dy=b.y-a.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
    const f=(dist-(td[e.r]||180))*0.003*alpha;
    const ffx=dx/dist*f,ffy=dy/dist*f;
    a.vx+=ffx;a.vy+=ffy;b.vx-=ffx;b.vy-=ffy;
  });
  nodes.forEach(n=>{n.vx-=n.x*0.0003*alpha;n.vy-=n.y*0.0003*alpha;});
  nodes.forEach(n=>{if(n===dragNode)return;n.vx*=0.82;n.vy*=0.82;n.x+=n.vx;n.y+=n.vy;});
  return true;
}

// ── Rendering ──
function worldToScreen(wx,wy){return{x:(wx-camera.x)*camera.zoom+W/2,y:(wy-camera.y)*camera.zoom+H/2};}
function screenToWorld(sx,sy){return{x:(sx-W/2)/camera.zoom+camera.x,y:(sy-H/2)/camera.zoom+camera.y};}

function isEdgeVisible(e) {
  if (activeFilter==='hierarchy'&&(e.r==='CanPrecede'||e.r==='PeerOf')) return false;
  if (activeFilter==='chain'&&e.r!=='CanPrecede') return false;
  if (activeFilter==='peer'&&e.r!=='PeerOf') return false;
  const a=nodeMap.get(e.s),b=nodeMap.get(e.t);
  return a&&b&&!hiddenTypes.has(a.type)&&!hiddenTypes.has(b.type);
}

function getReachableFromView(viewId) {
  const r=new Set();const q=[viewId];r.add(viewId);
  while(q.length){const id=q.shift();for(const e of(adjOut.get(id)||[])){if((e.r==='HasMember'||e.r==='ChildOf')&&!r.has(e.id)){r.add(e.id);q.push(e.id);}}}
  return r;
}
let viewReachable = null;
function isNodeVisible(n){if(hiddenTypes.has(n.type))return false;if(viewReachable&&!viewReachable.has(n.id))return false;return true;}

function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1a1a1a';ctx.fillRect(0,0,W,H);

  const hl=new Set();
  if(selectedNode){hl.add(selectedNode.id);edges.forEach(e=>{if(!isEdgeVisible(e))return;if(e.s===selectedNode.id)hl.add(e.t);if(e.t===selectedNode.id)hl.add(e.s);});}

  edges.forEach(e=>{
    if(!isEdgeVisible(e))return;
    const a=nodeMap.get(e.s),b=nodeMap.get(e.t);
    if(!isNodeVisible(a)||!isNodeVisible(b))return;
    const pa=worldToScreen(a.x,a.y),pb=worldToScreen(b.x,b.y);
    if((pa.x<-50&&pb.x<-50)||(pa.x>W+50&&pb.x>W+50))return;
    if((pa.y<-50&&pb.y<-50)||(pa.y>H+50&&pb.y>H+50))return;
    let color=EDGE_COLORS[e.r]||'#2a2a2a',width=e.r==='CanPrecede'?1.2:0.6,opacity=e.r==='CanPrecede'?0.6:0.3;
    if(selectedNode){if(hl.has(e.s)&&hl.has(e.t)){opacity=1;width*=2;if(e.r==='CanPrecede')color='#fbbf24';else if(e.r==='PeerOf')color='#999';else color='#555';}else{opacity=0.04;}}
    ctx.globalAlpha=opacity;ctx.strokeStyle=color;ctx.lineWidth=width;
    if(e.r==='CanPrecede')ctx.setLineDash([5,3]);else if(e.r==='PeerOf')ctx.setLineDash([2,2]);else ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.stroke();
    if(e.r==='CanPrecede'){const dx=pb.x-pa.x,dy=pb.y-pa.y,angle=Math.atan2(dy,dx),h=7;ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(pb.x,pb.y);ctx.lineTo(pb.x-h*Math.cos(angle-0.4),pb.y-h*Math.sin(angle-0.4));ctx.lineTo(pb.x-h*Math.cos(angle+0.4),pb.y-h*Math.sin(angle+0.4));ctx.closePath();ctx.fill();}
  });
  ctx.setLineDash([]);ctx.globalAlpha=1;

  const showLabels=camera.zoom>0.35,showDetail=camera.zoom>0.6;
  nodes.forEach(n=>{
    if(!isNodeVisible(n))return;
    const p=worldToScreen(n.x,n.y);
    if(p.x<-40||p.x>W+40||p.y<-40||p.y>H+40)return;
    const r=SIZES[n.type]*camera.zoom,c=COLORS[n.type];
    let na=1;if(selectedNode&&!hl.has(n.id))na=0.08;
    ctx.globalAlpha=na;
    if(n===selectedNode||n===hoveredNode){ctx.shadowColor=c.glow;ctx.shadowBlur=16*camera.zoom;}
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(r,2),0,Math.PI*2);ctx.fillStyle=c.fill;ctx.fill();
    if(n===selectedNode){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();}
    else if(n===hoveredNode){ctx.strokeStyle=c.fill;ctx.lineWidth=1.5;ctx.stroke();}
    ctx.shadowColor='transparent';ctx.shadowBlur=0;
    const shouldLabel=(n.type==='view'||n.type==='category')||(showLabels&&n.type==='meta')||(showDetail)||(n===selectedNode||n===hoveredNode);
    if(shouldLabel){const fs=Math.max(8,Math.min(12,10*camera.zoom));ctx.font=`${n.type==='view'||n.type==='category'?600:400} ${fs}px 'Segoe UI',system-ui,sans-serif`;ctx.textAlign='center';ctx.textBaseline='top';ctx.fillStyle='#e2e8f0';const l=n.name.length>35?n.name.slice(0,33)+'..':n.name;ctx.fillText(l,p.x,p.y+Math.max(r,2)+3,160*camera.zoom);}
  });
  ctx.globalAlpha=1;
}

// ── Interaction ──
function getNodeAt(sx,sy){const w=screenToWorld(sx,sy);let cl=null,cd=Infinity;const hp=12/camera.zoom;nodes.forEach(n=>{if(!isNodeVisible(n))return;const dx=n.x-w.x,dy=n.y-w.y,dist=Math.sqrt(dx*dx+dy*dy),hr=SIZES[n.type]/camera.zoom+hp;if(dist<hr&&dist<cd){cl=n;cd=dist;}});return cl;}

let lastMX=0,lastMY=0;
canvas.addEventListener('mousedown',e=>{const r=canvas.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top;lastMX=sx;lastMY=sy;const n=getNodeAt(sx,sy);if(n){dragNode=n;alpha=Math.max(alpha,0.1);}else{isPanning=true;panStart={x:e.clientX,y:e.clientY};}});
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top;if(dragNode){const w=screenToWorld(sx,sy);dragNode.x=w.x;dragNode.y=w.y;dragNode.vx=0;dragNode.vy=0;return;}if(isPanning){camera.x-=(e.clientX-panStart.x)/camera.zoom;camera.y-=(e.clientY-panStart.y)/camera.zoom;panStart={x:e.clientX,y:e.clientY};return;}const n=getNodeAt(sx,sy);hoveredNode=n;canvas.style.cursor=n?'pointer':'grab';const tt=document.getElementById('tooltip');if(n){tt.innerHTML=`<strong>${n.name}</strong><br><span class="tt-id">CAPEC-${n.id} &middot; ${n.type}</span>`;const gc=document.getElementById('graph-container').getBoundingClientRect();tt.style.left=(e.clientX-gc.left+14)+'px';tt.style.top=(e.clientY-gc.top-10)+'px';tt.style.display='block';}else{tt.style.display='none';}});
canvas.addEventListener('mouseup',e=>{const r=canvas.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top;if(dragNode&&Math.abs(sx-lastMX)+Math.abs(sy-lastMY)<5)selectNode(dragNode);dragNode=null;isPanning=false;});
canvas.addEventListener('wheel',e=>{e.preventDefault();const r=canvas.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top;const b=screenToWorld(sx,sy);camera.zoom*=e.deltaY>0?0.9:1.1;camera.zoom=Math.max(0.08,Math.min(6,camera.zoom));const a=screenToWorld(sx,sy);camera.x-=(a.x-b.x);camera.y-=(a.y-b.y);},{passive:false});

// ── Selection ──
function selectNode(node){selectedNode=node;updateDetailPanel();updateNodeList();if(viewMode==='tree')highlightTreeNode(node);}
function closeDetail(){document.getElementById('detail-panel').classList.remove('visible');selectedNode=null;updateNodeList();}
function focusNode(n){camera.x=n.x;camera.y=n.y;camera.zoom=Math.max(camera.zoom,1.2);}

function updateDetailPanel(){
  const p=document.getElementById('detail-panel');
  if(!selectedNode){p.classList.remove('visible');return;}
  p.classList.add('visible');
  document.getElementById('detail-name').textContent=selectedNode.name;
  document.getElementById('detail-id').textContent='CAPEC-'+selectedNode.id;
  const ts=document.getElementById('detail-type');ts.textContent=selectedNode.type;ts.style.background=COLORS[selectedNode.type].fill;ts.style.color='#fff';
  document.getElementById('detail-link').href=`https://capec.mitre.org/data/definitions/${selectedNode.id}.html`;
  const conn=document.getElementById('detail-connections');conn.innerHTML='';
  const sec={parents:[],children:[],precedes:[],followedBy:[],peers:[]};
  (adjOut.get(selectedNode.id)||[]).forEach(e=>{const n=nodeMap.get(e.id);if(!n)return;if(e.r==='CanPrecede')sec.precedes.push(n);else if(e.r==='PeerOf')sec.peers.push(n);else sec.children.push(n);});
  (adjIn.get(selectedNode.id)||[]).forEach(e=>{const n=nodeMap.get(e.id);if(!n)return;if(e.r==='CanPrecede')sec.followedBy.push(n);else if(e.r==='PeerOf'){if(!sec.peers.find(p=>p.id===n.id))sec.peers.push(n);}else sec.parents.push(n);});
  const labels={parents:'Parent Of',children:'Children',precedes:'Can Precede',followedBy:'Preceded By',peers:'Peers'};
  Object.entries(sec).forEach(([k,items])=>{if(!items.length)return;const s=document.createElement('div');s.className='conn-section';s.innerHTML=`<div class="conn-label">${labels[k]} (${items.length})</div>`;items.forEach(item=>{const el=document.createElement('div');el.className='conn-item';el.textContent=`CAPEC-${item.id}: ${item.name}`;el.onclick=()=>{selectNode(item);if(viewMode==='graph')focusNode(item);};s.appendChild(el);});conn.appendChild(s);});
}

// ── Tree View ──
function buildTree() {
  const tc = document.getElementById('tree-container');
  tc.innerHTML = '';

  // Determine root view
  const rootId = activeView === 'all' ? null : activeView;
  const viewNodes = rootId ? [nodeMap.get(rootId)] : nodes.filter(n => n.type === 'view');

  viewNodes.forEach(v => {
    if (!v) return;
    const el = createTreeNode(v, 0);
    tc.appendChild(el);
  });
}

function createTreeNode(node, depth) {
  const div = document.createElement('div');
  div.className = 'tree-node';
  div.dataset.id = node.id;

  const children = getTreeChildren(node.id);
  const canPrecede = (adjOut.get(node.id) || []).filter(e => e.r === 'CanPrecede');

  const row = document.createElement('div');
  row.className = 'tree-row';

  const toggle = document.createElement('span');
  toggle.className = 'tree-toggle' + (children.length ? '' : ' leaf');
  toggle.textContent = '\u25B6';

  const dot = document.createElement('span');
  dot.className = 'tree-dot';
  dot.style.background = COLORS[node.type].fill;

  const label = document.createElement('span');
  label.className = 'tree-label';
  label.textContent = node.name;

  const idSpan = document.createElement('span');
  idSpan.className = 'tree-id';
  idSpan.textContent = 'CAPEC-' + node.id;

  row.appendChild(toggle);
  row.appendChild(dot);
  row.appendChild(label);
  row.appendChild(idSpan);

  if (canPrecede.length) {
    const badge = document.createElement('span');
    badge.className = 'tree-chain-badge';
    badge.textContent = canPrecede.length + ' chain' + (canPrecede.length > 1 ? 's' : '');
    badge.title = 'Can precede: ' + canPrecede.map(e => 'CAPEC-' + e.id).join(', ');
    row.appendChild(badge);
  }

  div.appendChild(row);

  let childContainer = null;
  let expanded = depth < 1; // Auto-expand first level

  if (children.length) {
    childContainer = document.createElement('div');
    childContainer.className = 'tree-children';
    childContainer.style.display = expanded ? 'block' : 'none';
    if (expanded) {
      toggle.classList.add('expanded');
      children.forEach(cid => {
        const cn = nodeMap.get(cid);
        if (cn) childContainer.appendChild(createTreeNode(cn, depth + 1));
      });
    }
    div.appendChild(childContainer);
  }

  toggle.onclick = (e) => {
    e.stopPropagation();
    if (!children.length) return;
    expanded = !expanded;
    toggle.classList.toggle('expanded', expanded);
    if (expanded && !childContainer.children.length) {
      children.forEach(cid => {
        const cn = nodeMap.get(cid);
        if (cn) childContainer.appendChild(createTreeNode(cn, depth + 1));
      });
    }
    childContainer.style.display = expanded ? 'block' : 'none';
  };

  row.onclick = () => {
    document.querySelectorAll('.tree-row').forEach(r => r.classList.remove('selected'));
    row.classList.add('selected');
    selectNode(node);
  };

  return div;
}

function getTreeChildren(parentId) {
  const out = adjOut.get(parentId) || [];
  return out.filter(e => e.r === 'HasMember' || e.r === 'ChildOf').map(e => e.id);
}

function highlightTreeNode(node) {
  document.querySelectorAll('.tree-row').forEach(r => r.classList.remove('selected'));
  const el = document.querySelector(`.tree-node[data-id="${node.id}"] > .tree-row`);
  if (el) { el.classList.add('selected'); el.scrollIntoView({ block: 'center', behavior: 'smooth' }); }
}

// ── Mode toggle ──
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    viewMode = btn.dataset.mode;
    const gc = document.getElementById('graph-container');
    const tc = document.getElementById('tree-container');
    if (viewMode === 'tree') {
      gc.style.display = 'none';
      tc.classList.add('visible');
      buildTree();
    } else {
      gc.style.display = '';
      tc.classList.remove('visible');
      resize();
    }
  });
});

// ── Sidebar ──
function buildLegend(){
  const legend=document.getElementById('legend');
  Object.entries(COLORS).forEach(([type,c])=>{
    const count=nodes.filter(n=>n.type===type).length;
    const item=document.createElement('div');item.className='legend-item';
    item.innerHTML=`<span class="legend-dot" style="background:${c.fill}"></span>${type} (${count})`;
    item.onclick=()=>{if(hiddenTypes.has(type)){hiddenTypes.delete(type);item.classList.remove('dimmed');}else{hiddenTypes.add(type);item.classList.add('dimmed');}updateNodeList();};
    legend.appendChild(item);
  });
}

function buildViewSelector(){
  const sel=document.getElementById('view-select');
  nodes.filter(n=>n.type==='view').forEach(v=>{const o=document.createElement('option');o.value=v.id;o.textContent=`CAPEC-${v.id}: ${v.name}`;sel.appendChild(o);});
  sel.addEventListener('change',()=>{activeView=sel.value;if(activeView==='all')viewReachable=null;else viewReachable=getReachableFromView(activeView);updateNodeList();if(viewMode==='tree')buildTree();});
}

let listDebounce=null;
function updateNodeList(){clearTimeout(listDebounce);listDebounce=setTimeout(_updateNodeList,50);}
function _updateNodeList(){
  const list=document.getElementById('node-list');
  const query=document.getElementById('search').value.toLowerCase();
  const filtered=nodes.filter(n=>{if(!isNodeVisible(n))return false;if(query&&!n.name.toLowerCase().includes(query)&&!n.id.includes(query))return false;return true;});
  const order={view:0,category:1,meta:2,standard:3,detailed:4};
  filtered.sort((a,b)=>order[a.type]-order[b.type]||a.name.localeCompare(b.name));
  const shown=filtered.slice(0,200);
  list.innerHTML='';
  shown.forEach(n=>{
    const item=document.createElement('div');item.className='node-item'+(n===selectedNode?' selected':'');
    item.innerHTML=`<span class="dot" style="background:${COLORS[n.type].fill}"></span><div><div class="name" title="${n.name}">${n.name}</div><div class="id-label">CAPEC-${n.id} &middot; ${n.type}</div></div>`;
    item.onclick=()=>{selectNode(n);if(viewMode==='graph')focusNode(n);};
    list.appendChild(item);
  });
  const extra=filtered.length>200?` (showing 200/${filtered.length})`:'';
  document.getElementById('stats').textContent=`${filtered.length} patterns${extra}`;
}

document.querySelectorAll('.filter-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activeFilter=btn.dataset.filter;updateNodeList();});});
document.getElementById('search').addEventListener('input', () => { updateNodeList(); if(viewMode==='tree') buildTree(); });

function zoomIn(){camera.zoom=Math.min(6,camera.zoom*1.3);}
function zoomOut(){camera.zoom=Math.max(0.08,camera.zoom*0.7);}
function resetView(){camera={x:0,y:0,zoom:0.6};selectedNode=null;closeDetail();}

// ── Main loop ──
let simDone=false;
function loop(){if(!simDone){if(!simulate())simDone=true;}draw();requestAnimationFrame(loop);}

// ── Init ──
window.addEventListener('resize',resize);
resize(); initPositions();

let preSimSteps=0;
function preSim(){
  for(let i=0;i<50;i++){simulate();preSimSteps++;}
  if(preSimSteps<400){document.getElementById('loading').textContent=`Simulating layout... ${Math.round(preSimSteps/4)}%`;requestAnimationFrame(preSim);}
  else{document.getElementById('loading').classList.add('hidden');alpha=0.02;buildLegend();buildViewSelector();updateNodeList();loop();}
}
preSim();
</script>
</body>
</html>
